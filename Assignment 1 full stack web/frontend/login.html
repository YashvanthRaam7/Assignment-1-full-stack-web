<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASSIGNMENT 1 </title>
  <link rel="stylesheet" href="static/css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="brand">
      <span class="brand-icon">⬡</span>
      <h1>Hello !!!</h1>
      <p class="subtitle">Enter your details </p>
    </div>

    <div id="msg" class="message hidden"></div>

    <div class="form-grid">
      <div class="field full">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your e-mail" autocomplete="email" />
      </div>
      <div class="field full">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" autocomplete="current-password" />
      </div>
    </div>

    <button class="btn-primary" onclick="login()">Log In</button>

    <p class="switch-link">Don't have an account? <a href="signup.html">Sign up</a></p>
  </div>

  <script src="static/js/auth.js"></script>
</body>
</html>

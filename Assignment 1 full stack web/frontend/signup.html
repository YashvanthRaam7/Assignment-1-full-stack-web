<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – FullStack App</title>
  <link rel="stylesheet" href="static/css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="brand">
      <span class="brand-icon">⬡</span>
      <h1>Create Account</h1>
      <p class="subtitle">Enter ur details</p>
    </div>

    <div id="msg" class="message hidden"></div>

    <div class="form-grid">
      <div class="field">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter ur name" autocomplete="name" />
      </div>

      <div class="field">
        <label for="age">Age</label>
        <input type="number" id="age" placeholder="Enter ur age" min="1" max="120" />
      </div>

      <div class="field full">
        <label for="address">Address</label>
        <input type="text" id="address" placeholder="Enter ur address" />
      </div>

      <div class="field full">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter ur e-mail" autocomplete="email" />
      </div>

      <div class="field">
        <label for="mobile">Mobile Number</label>
        <input type="tel" id="mobile" placeholder="Enter ur phno" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter ur password" autocomplete="new-password" />
      </div>
    </div>

    <button class="btn-primary" id="signupBtn" onclick="signup()">Create Account</button>

    <p class="switch-link">Already have an account? <a href="login.html">Log in</a></p>
  </div>

  <script src="static/js/auth.js"></script>
</body>
</html>
